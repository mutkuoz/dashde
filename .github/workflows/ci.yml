name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: install deps
        run: npm install --no-audit --no-fund

      - name: typecheck
        run: npm run typecheck

      - name: format check
        run: npm run format:check
