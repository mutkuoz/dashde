# dashde — default configuration
#
# Drop this at ~/.config/dashboard/config.yaml and edit live.
# The dashboard hot-reloads within ~300ms of any save.
#
# Themes: luxury-journal (default), cyber-hud, minimal-mono
# Full widget reference: docs/widgets.md
# How to add a widget type in one file: CONTRIBUTING.md

theme: luxury-journal

# Optional window tuning (omit for a fullscreen layer-shell background).
# window:
#   layer: background     # background | bottom | top | overlay
#   anchor: [top, bottom, left, right]

greeting:
  name: Utku

# ─── layout ─────────────────────────────────────────────────────────
# Column proportions per row, overridable by row index (as string keys).
#   default: [1, 1]        → equal split for 2-cell rows
#   "0": [3, 1]            → row index 0 uses 3:1 (ignored if cell count differs)
layout_widths:
  "0": [3, 1]           # greeting dominates, clock narrow
  "1": [3, 2]           # tasks main, notes secondary — both full height
  "2": [1, 1, 1]        # machine · connection · quick-launch

layout:
  - [greeting, clock]
  - [tasks, notes]
  - [machine, connection, quick-launch]

# ─── widgets ────────────────────────────────────────────────────────
widgets:
  greeting:
    type: greeting
    name: Utku

  clock:
    type: clock
    format: "24h"
    show_period: true
    show_date: true

  tasks:
    type: tasks
    file: ~/notes/tasks.md
    show_done: true
    editable: true         # shows an "add a task…" input at bottom

  notes:
    type: notes
    file: ~/notes/scratch.md

  machine:
    type: machine
    compact: true          # one-line rows instead of bars — denser
    show: [cpu, memory, disk, battery]

  connection:
    type: connection
    show: [wifi, speed, ping, public_ip]

  quick-launch:
    type: quick_launch
    columns: 3
    items:
      - { icon: folder,   label: files,  command: "xdg-open $HOME" }
      - { icon: web,      label: web,    command: "xdg-open https://duckduckgo.com" }
      - { icon: terminal, label: term,   command: "kitty || gnome-terminal || xterm" }
      - { icon: code,     label: code,   command: "code ~/code || xdg-open ~/code" }
      - { icon: mail,     label: mail,   command: thunderbird }
      - { icon: gear,     label: prefs,  command: "dashde:open-settings" }

# ─── additional examples, off by default ────────────────────────────
